###############################################################################
# Perfodia — Docker Compose
###############################################################################
# Usage:
#   docker compose run --rm perfodia -t 192.168.1.100 -m full -v
#   docker compose run --rm perfodia-minimal -t 192.168.1.100 -m scan -v
#   docker compose run --rm perfodia shell
#
# Reports are saved to ./reports/ on your host machine.
###############################################################################

services:

  # ── Full image — all tools included ──
  perfodia:
    build:
      context: .
      target: full
    image: perfodia:full
    container_name: perfodia
    network_mode: host          # Required for raw socket scans (SYN, etc.)
    cap_add:
      - NET_ADMIN               # Nmap SYN scan, OS detection
      - NET_RAW                 # Raw packet crafting
    volumes:
      - ./reports:/opt/perfodia/reports       # Persist reports to host
      - ./configs:/opt/perfodia/configs:ro    # Mount custom configs
    working_dir: /opt/perfodia
    stdin_open: true
    tty: true

  # ── Minimal image — scanning only, smaller footprint ──
  perfodia-minimal:
    build:
      context: .
      target: minimal
    image: perfodia:minimal
    container_name: perfodia-minimal
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./reports:/opt/perfodia/reports
      - ./configs:/opt/perfodia/configs:ro
    working_dir: /opt/perfodia
    stdin_open: true
    tty: true